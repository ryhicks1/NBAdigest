name: NBA Betting Anomalies Digest

on:
  schedule:
    # 7am AEDT = 8pm UTC previous day (UTC+11)
    # 7am AEST = 9pm UTC previous day (UTC+10)
    # Using 20:00 UTC for AEDT (Nov-Apr), adjust to 21:00 for AEST (Apr-Oct)
    - cron: "0 20 * * *"
  workflow_dispatch: # Allow manual trigger

jobs:
  generate-digest:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pipeline
        env:
          THE_ODDS_API_KEY: ${{ secrets.THE_ODDS_API_KEY }}
        run: python src/main.py

      - name: Commit and push results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/anomalies.json
          git diff --staged --quiet || git commit -m "Update anomalies digest $(date -u +%Y-%m-%d)"
          git push
